services:
  tuiameaburre:
    build: .
    container_name: tuiameaburre
    restart: unless-stopped
    environment:
      PORT: "5050"
      NODE_ENV: "production"
      DB_PATH: "/app/data/tuia.db"
    volumes:
      - tuia-data:/app/data
    networks:
      tuia-net:
        aliases:
          - tuiameaburre

  tuiameaburre-cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tuiameaburre-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - tuiameaburre
    networks:
      - tuia-net
    restart: unless-stopped

networks:
  tuia-net:
    name: tuia-net
    driver: bridge

volumes:
  tuia-data:
    name: tuia-data
